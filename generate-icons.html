<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');

  // Background
  const bg = ctx.createLinearGradient(0, 0, s, s);
  bg.addColorStop(0, '#13131c');
  bg.addColorStop(1, '#0a0a0f');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.22);
  ctx.fill();

  // Outer glow ring
  const ring = ctx.createRadialGradient(s/2, s/2, s*0.2, s/2, s/2, s*0.45);
  ring.addColorStop(0, 'rgba(108,99,255,0.3)');
  ring.addColorStop(1, 'rgba(108,99,255,0)');
  ctx.fillStyle = ring;
  ctx.beginPath();
  ctx.arc(s/2, s/2, s*0.45, 0, Math.PI*2);
  ctx.fill();

  // Circle bg
  const cg = ctx.createLinearGradient(s*0.25, s*0.25, s*0.75, s*0.75);
  cg.addColorStop(0, '#6c63ff');
  cg.addColorStop(1, '#00d4ff');
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.arc(s/2, s/2, s*0.35, 0, Math.PI*2);
  ctx.fill();

  // Speaker emoji / sound waves
  ctx.font = `${s*0.3}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🔊', s/2, s/2);
}

const c192 = document.getElementById('c192');
const c512 = document.getElementById('c512');
drawIcon(c192);
drawIcon(c512);

function download(canvas, name) {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = name;
  a.click();
}

download(c192, 'icon-192.png');
download(c512, 'icon-512.png');
</script>
</body>
</html>
